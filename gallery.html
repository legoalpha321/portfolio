<script>
  const lb=document.getElementById('lightbox');
  const frame=document.getElementById('lbFrame');
  const lbTitle=document.getElementById('lbTitle');
  const lbBlurb=document.getElementById('lbBlurb');

  function openLB(el){
    const id=el.dataset.vimeo;
    const hash=el.dataset.vimeoHash;
    const yt=el.dataset.youtube;
    lbTitle.textContent=el.dataset.title||'';
    lbBlurb.textContent=el.dataset.blurb||'';
    if(yt) frame.src=`https://www.youtube.com/embed/${yt}?autoplay=1`;
    else frame.src=id ? `https://player.vimeo.com/video/${id}?autoplay=1${hash?'&h='+hash:''}&title=0&byline=0&portrait=0&dnt=1` : '';
    lb.classList.add('open');
    lb.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
  }
  function closeLB(){
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden','true');
    frame.src='';
    document.body.style.overflow='';
  }
  document.querySelectorAll('.gitem').forEach(el=>el.addEventListener('click',()=>openLB(el)));
  document.getElementById('lbClose').addEventListener('click',closeLB);
  lb.addEventListener('click',e=>{ if(e.target===lb) closeLB(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&lb.classList.contains('open')) closeLB(); });
</script>
